<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard - September Designz</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Additional admin-only styles */
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .booking-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .booking-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            border-left: 4px solid #c084fc;
        }
        
        .booking-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .booking-price {
            color: #c084fc;
            font-size: 20px;
            font-weight: bold;
        }
        
        .delete-btn {
            background: rgba(248,113,113,0.2);
            border: 1px solid #f87171;
            color: #f87171;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        .delete-btn:hover {
            background: rgba(248,113,113,0.4);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(192,132,252,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #c084fc;
        }
        
        .stat-label {
            color: #888;
            margin-top: 5px;
        }
        
        .export-btn {
            background: linear-gradient(135deg, #c084fc, #8b5cf6);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 16px;
        }
        
        .export-btn:hover {
            transform: translateY(-2px);
        }
        
        h1 {
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="container">
            <div class="logo">September<span>Designz</span></div>
            <div class="nav-links">
                <a href="index.html">← Back to Website</a>
            </div>
        </div>
    </div>

    <div class="admin-container">
        <h1>📋 Booking Dashboard</h1>
        <p class="subtitle">Here are all your client booking requests</p>
        
        <button class="export-btn" onclick="exportBookings()">📥 Export to CSV</button>
        
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalBookings">0</div>
                <div class="stat-label">Total Bookings</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalRevenue">$0</div>
                <div class="stat-label">Total Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingBookings">0</div>
                <div class="stat-label">This Month</div>
            </div>
        </div>
        
        <div id="bookingsList" class="booking-list"></div>
    </div>

    <script>
        function loadBookings() {
            const bookings = JSON.parse(localStorage.getItem('september_bookings') || '[]');
            const bookingsList = document.getElementById('bookingsList');
            const totalBookingsSpan = document.getElementById('totalBookings');
            const totalRevenueSpan = document.getElementById('totalRevenue');
            const pendingBookingsSpan = document.getElementById('pendingBookings');
            
            totalBookingsSpan.textContent = bookings.length;
            
            const totalRevenue = bookings.reduce((sum, b) => sum + (b.price || 0), 0);
            totalRevenueSpan.textContent = `$${totalRevenue}`;
            
            const thisMonth = bookings.filter(b => {
                const bookingDate = new Date(b.timestamp);
                const now = new Date();
                return bookingDate.getMonth() === now.getMonth() && 
                       bookingDate.getFullYear() === now.getFullYear();
            }).length;
            pendingBookingsSpan.textContent = thisMonth;
            
            if (bookings.length === 0) {
                bookingsList.innerHTML = '<div class="booking-card" style="text-align: center; color: #888;">✨ No bookings yet. Share your site to get clients!</div>';
                return;
            }
            
            bookingsList.innerHTML = bookings.slice().reverse().map(booking => `
                <div class="booking-card" data-id="${booking.id}">
                    <div class="booking-header">
                        <strong>📅 ${booking.date || 'Date not set'}</strong>
                        <span class="booking-price">$${booking.price}</span>
                    </div>
                    <div><strong>👤 ${escapeHtml(booking.name)}</strong> - ${escapeHtml(booking.email)}</div>
                    <div>🎨 Service: ${escapeHtml(booking.service)}</div>
                    ${booking.details ? `<div>📝 ${escapeHtml(booking.details.substring(0, 100))}${booking.details.length > 100 ? '...' : ''}</div>` : ''}
                    <div style="font-size: 12px; color: #666; margin-top: 10px;">Submitted: ${new Date(booking.timestamp).toLocaleString()}</div>
                    <button class="delete-btn" onclick="deleteBooking(${booking.id})">🗑️ Delete</button>
                </div>
            `).join('');
        }
        
        function deleteBooking(id) {
            if (confirm('Delete this booking?')) {
                let bookings = JSON.parse(localStorage.getItem('september_bookings') || '[]');
                bookings = bookings.filter(b => b.id !== id);
                localStorage.setItem('september_bookings', JSON.stringify(bookings));
                loadBookings();
            }
        }
        
        function exportBookings() {
            const bookings = JSON.parse(localStorage.getItem('september_bookings') || '[]');
            if (bookings.length === 0) {
                alert('No bookings to export!');
                return;
            }
            
            // Create CSV content
            let csvContent = "Name,Email,Service,Price,Date,Details,Timestamp\n";
            bookings.forEach(booking => {
                csvContent += `"${booking.name}","${booking.email}","${booking.service}",${booking.price},"${booking.date || ''}","${(booking.details || '').replace(/"/g, '""')}","${booking.timestamp}"\n`;
            });
            
            // Download file
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `september-bookings-${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadBookings();
    </script>
</body>
</html>
