<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - September Designz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .admin-header {
            margin-bottom: 40px;
        }
        
        .admin-header h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(192, 132, 252, 0.1), rgba(139, 92, 246, 0.05));
            border: 1px solid rgba(192, 132, 252, 0.2);
            border-radius: 24px;
            padding: 24px;
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-icon {
            width: 60px;
            height: 60px;
            background: rgba(192, 132, 252, 0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .stat-icon i {
            font-size: 32px;
            color: #c084fc;
        }
        
        .stat-number {
            font-size: 48px;
            font-weight: 800;
            color: #c084fc;
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 16px;
            color: #94a3b8;
            font-weight: 500;
        }
        
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .btn-export {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        .btn-export:hover {
            transform: translateY(-2px);
        }
        
        .filter-bar {
            display: flex;
            gap: 12px;
        }
        
        .filter-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        
        .bookings-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .booking-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 24px;
            border-left: 4px solid #c084fc;
            transition: all 0.3s;
        }
        
        .booking-card:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }
        
        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .booking-id {
            font-size: 14px;
            color: #64748b;
            font-family: monospace;
        }
        
        .booking-price {
            font-size: 28px;
            font-weight: 800;
            color: #c084fc;
        }
        
        .booking-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 16px 0;
        }
        
        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .detail-label {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .detail-value {
            font-size: 16px;
            font-weight: 500;
        }
        
        .booking-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: scale(1.05);
        }
        
        .btn-view {
            background: rgba(192, 132, 252, 0.2);
            border: 1px solid #c084fc;
            color: #c084fc;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
        }
        
        .empty-state i {
            font-size: 64px;
            color: #c084fc;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-bar {
                justify-content: center;
            }
            
            .booking-header {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">September<span>Designz</span></div>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
                <a href="#" onclick="window.location.reload();"><i class="fas fa-sync-alt"></i> Refresh</a>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-chalkboard-user"></i> Booking Dashboard</h1>
            <p>Manage and track all client booking requests</p>
        </div>
        
        <div class="stats-grid" id="statsGrid"></div>
        
        <div class="action-bar">
            <button class="btn-export" onclick="exportAllBookings()">
                <i class="fas fa-download"></i> Export to CSV
            </button>
            <div class="filter-bar">
                <select id="filterService" class="filter-select" onchange="filterBookings()">
                    <option value="all">All Services</option>
                    <option value="Graphic Design">Graphic Design</option>
                    <option value="Web Development">Web Development</option>
                    <option value="UI/UX Design">UI/UX Design</option>
                </select>
                <select id="filterDate" class="filter-select" onchange="filterBookings()">
                    <option value="all">All Time</option>
                    <option value="today">Today</option>
                    <option value="week">This Week</option>
                    <option value="month">This Month</option>
                </select>
            </div>
        </div>
        
        <div id="bookingsList" class="bookings-list"></div>
    </div>

    <script>
        let allBookings = [];
        
        function loadBookings() {
            allBookings = JSON.parse(localStorage.getItem('september_bookings') || '[]');
            updateStats();
            filterBookings();
        }
        
        function updateStats() {
            const totalBookings = allBookings.length;
            const totalRevenue = allBookings.reduce((sum, b) => sum + (b.price || 0), 0);
            const pendingBookings = allBookings.filter(b => !b.status || b.status === 'pending').length;
            const avgValue = totalBookings > 0 ? totalRevenue / totalBookings : 0;
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                    <div class="stat-number">${totalBookings}</div>
                    <div class="stat-label">Total Bookings</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-dollar-sign"></i></div>
                    <div class="stat-number">$${totalRevenue.toLocaleString()}</div>
                    <div class="stat-label">Total Revenue</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
                    <div class="stat-number">${pendingBookings}</div>
                    <div class="stat-label">Pending Bookings</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                    <div class="stat-number">$${Math.round(avgValue).toLocaleString()}</div>
                    <div class="stat-label">Average Order Value</div>
                </div>
            `;
        }
        
        function filterBookings() {
            const serviceFilter = document.getElementById('filterService').value;
            const dateFilter = document.getElementById('filterDate').value;
            
            let filtered = [...allBookings];
            
            if (serviceFilter !== 'all') {
                filtered = filtered.filter(b => b.service.includes(serviceFilter));
            }
            
            if (dateFilter !== 'all') {
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                
                if (dateFilter === 'today') {
                    filtered = filtered.filter(b => {
                        const bookingDate = new Date(b.timestamp);
                        return bookingDate >= today;
                    });
                } else if (dateFilter === 'week') {
                    const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                    filtered = filtered.filter(b => new Date(b.timestamp) >= weekAgo);
                } else if (dateFilter === 'month') {
                    const monthAgo = new Date(now.getFullYear(), now.getMonth() - 1, now.getDate());
                    filtered = filtered.filter(b => new Date(b.timestamp) >= monthAgo);
                }
            }
            
            displayBookings(filtered);
        }
        
        function displayBookings(bookings) {
            const bookingsList = document.getElementById('bookingsList');
            
            if (bookings.length === 0) {
                bookingsList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No Bookings Found</h3>
                        <p>There are no bookings matching your filters.</p>
                    </div>
                `;
                return;
            }
            
            bookingsList.innerHTML = bookings.slice().reverse().map(booking => `
                <div class="booking-card" data-id="${booking.id}">
                    <div class="booking-header">
                        <div>
                            <strong style="font-size: 18px;">${escapeHtml(booking.name)}</strong>
                            <div class="booking-id">Booking #${booking.id}</div>
                        </div>
                        <div class="booking-price">$${booking.price}</div>
                    </div>
                    
                    <div class="booking-details">
                        <div class="detail-item">
                            <div class="detail-label"><i class="fas fa-envelope"></i> Email</div>
                            <div class="detail-value">${escapeHtml(booking.email)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label"><i class="fas fa-paintbrush"></i> Service</div>
                            <div class="detail-value">${escapeHtml(booking.service)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label"><i class="fas fa-calendar"></i> Preferred Date</div>
                            <div class="detail-value">${booking.date || 'Not specified'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label"><i class="fas fa-clock"></i> Submitted</div>
                            <div class="detail-value">${new Date(booking.timestamp).toLocaleString()}</div>
                        </div>
                    </div>
                    
                    ${booking.details ? `
                        <div class="detail-item" style="margin-top: 12px;">
                            <div class="detail-label"><i class="fas fa-file-alt"></i> Project Details</div>
                            <div class="detail-value">${escapeHtml(booking.details.substring(0, 200))}${booking.details.length > 200 ? '...' : ''}</div>
                        </div>
                    ` : ''}
                    
                    <div class="booking-actions">
                        <button class="btn-delete" onclick="deleteBooking(${booking.id})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                        <button class="btn-view" onclick="viewBookingDetails(${booking.id})">
                            <i class="fas fa-eye"></i> View Details
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function deleteBooking(id) {
            if (confirm('⚠️ Are you sure you want to delete this booking? This action cannot be undone.')) {
                allBookings = allBookings.filter(b => b.id !== id);
                localStorage.setItem('september_bookings', JSON.stringify(allBookings));
                loadBookings();
                showToast('Booking deleted successfully!', 'success');
            }
        }
        
        function viewBookingDetails(id) {
            const booking = allBookings.find(b => b.id === id);
            if (booking) {
                alert(`📋 Booking Details\n\nName: ${booking.name}\nEmail: ${booking.email}\nService: ${booking.service}\nPrice: $${booking.price}\nDate: ${booking.date || 'Not specified'}\n\nProject Details:\n${booking.details || 'No details provided'}\n\nSubmitted: ${new Date(booking.timestamp).toLocaleString()}`);
            }
        }
        
        function exportAllBookings() {
            if (allBookings.length === 0) {
                alert('No bookings to export!');
                return;
            }
            
            let csvContent = "Booking ID,Name,Email,Service,Price,Preferred Date,Project Details,Submission Date\n";
            allBookings.forEach(booking => {
                csvContent += `${booking.id},"${booking.name}","${booking.email}","${booking.service}",${booking.price},"${booking.date || ''}","${(booking.details || '').replace(/"/g, '""')}","${booking.timestamp}"\n`;
            });
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', `september-bookings-${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            showToast('Export completed!', 'success');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.right = '20px';
            toast.style.backgroundColor = type === 'success' ? '#10b981' : '#ef4444';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '40px';
            toast.style.zIndex = '1000';
            toast.style.animation = 'slideIn 0.3s ease';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Add animation style
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
        `;
        document.head.appendChild(style);
        
        loadBookings();
    </script>
</body>
</html>
